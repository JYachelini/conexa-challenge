name: Deploy app on Vercel

on:
  push:
    branches:
      - development

jobs:
  deploy:
    name: Deploy
    environment: ${{ github.ref == 'refs/heads/master' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'development' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Debug file structure
        run: |
          echo "=== Project structure ==="
          find src -type f -name "*.ts" | grep -E "(database|app)" | sort
          echo "=== Database module files ==="
          ls -la src/modules/database/ || echo "database directory not found"
          echo "=== TypeScript config ==="
          cat tsconfig.json

      - name: Install dependencies
        run: npm install --package-lock-only && npm ci

      - name: Build NestJS application
        run: |
          echo "Building with detailed output..."
          npm run build -- --verbose

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod --build-env APP_VERSION="${{ github.sha }}"
